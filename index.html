<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login - AlumniFin</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1419b3",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111121",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#111118] dark:text-white antialiased">
<div class="relative flex min-h-screen w-full flex-col justify-center overflow-hidden py-6 sm:py-12">
<div class="relative py-3 sm:mx-auto sm:max-w-xl w-full px-4 sm:px-0">
<!-- Background Decorative Elements -->
<div class="absolute inset-0 -skew-y-6 transform bg-gradient-to-r from-primary/20 to-primary/40 shadow-lg sm:-rotate-6 sm:skew-y-0 sm:rounded-3xl dark:from-primary/10 dark:to-primary/30"></div>
<!-- Main Login Card -->
<div class="relative bg-white dark:bg-[#1e1e2d] px-4 py-10 shadow-lg sm:rounded-3xl sm:p-20 border border-gray-100 dark:border-gray-700">
<div class="mx-auto max-w-md">
<!-- Header Section -->
<div class="flex flex-col items-center justify-center space-y-4">
<div class="flex h-16 w-16 items-center justify-center rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined text-4xl">account_balance</span>
</div>
<div class="text-center">
<h1 class="text-2xl font-bold tracking-tight text-gray-900 dark:text-white sm:text-3xl">Treasurer Portal</h1>
<p class="mt-2 text-sm text-gray-500 dark:text-gray-400">Secure access for financial administration</p>
</div>
</div>
<div class="divide-y divide-gray-200 dark:divide-gray-700">
<div class="py-8 text-base leading-6 space-y-4 text-gray-700 dark:text-gray-300 sm:text-lg sm:leading-7">
<!-- Username Field -->
<div class="relative">
<label class="sr-only" for="username">Username or ID</label>
<div class="relative flex items-center">
<span class="absolute left-4 text-gray-400 dark:text-gray-500">
<span class="material-symbols-outlined">person</span>
</span>
<input autocomplete="off" class="peer h-14 w-full rounded-lg border-gray-300 dark:border-gray-600 bg-transparent py-2 pl-12 pr-4 text-gray-900 dark:text-white placeholder-gray-400 focus:border-primary focus:ring-primary focus:outline-none focus:ring-1 dark:bg-[#2a2a3c]" id="username" name="username" placeholder="Username or Treasurer ID" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="relative mt-4">
<label class="sr-only" for="password">Password</label>
<div class="relative flex items-center">
<span class="absolute left-4 text-gray-400 dark:text-gray-500">
<span class="material-symbols-outlined">lock</span>
</span>
<input autocomplete="current-password" class="peer h-14 w-full rounded-lg border-gray-300 dark:border-gray-600 bg-transparent py-2 pl-12 pr-12 text-gray-900 dark:text-white placeholder-gray-400 focus:border-primary focus:ring-primary focus:outline-none focus:ring-1 dark:bg-[#2a2a3c]" id="password" name="password" placeholder="Password" type="password"/>
<button class="absolute right-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 focus:outline-none" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Actions Row -->
<div class="flex items-center justify-between pt-2">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-gray-300 text-primary focus:ring-primary bg-gray-50 dark:bg-gray-700 dark:border-gray-600" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-gray-700 dark:text-gray-300" for="remember-me">Remember me</label>
</div>
<div class="text-sm">
<a class="font-medium text-primary hover:text-primary/80" href="#">Forgot password?</a>
</div>
</div>
<!-- Login Button -->
<div class="pt-4">
<button class="group relative flex w-full justify-center rounded-lg bg-primary px-4 py-3 text-sm font-semibold text-white transition-colors hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-[#1e1e2d]">
<span class="absolute inset-y-0 left-0 flex items-center pl-3">
<span class="material-symbols-outlined text-primary/40 group-hover:text-white/60 transition-colors">lock_open</span>
</span>
                                    Access Dashboard
                                </button>
</div>
<!-- Security Badge -->
<div class="pt-6 flex justify-center items-center gap-2 opacity-60">
<span class="material-symbols-outlined text-green-600 dark:text-green-400 text-lg">verified_user</span>
<span class="text-xs text-gray-500 dark:text-gray-400 font-medium uppercase tracking-wide">256-bit SSL Encrypted</span>
</div>
</div>
<!-- Footer Links -->
<div class="pt-6 text-center text-sm">
<p class="text-gray-500 dark:text-gray-400">
                                Need assistance? <a class="font-medium text-primary hover:text-primary/80" href="#">Contact Support</a>
</p>
<p class="mt-8 text-xs text-gray-400 dark:text-gray-600">
                                Secured by AlumniFin v1.0
                            </p>
</div>
</div>
</div>
</div>
</div>
</div>
</body></html>
